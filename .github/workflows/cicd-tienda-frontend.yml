name: CI/CD Tienda Perritos - Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag and Push Image
        run: |
          docker build -t frontend ./frontend
          docker tag frontend:latest 536342473074.dkr.ecr.us-east-1.amazonaws.com/frontend:latest
          docker push 536342473074.dkr.ecr.us-east-1.amazonaws.com/frontend:latest

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_FRONTEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Actualizando contenedor Frontend" \
            --parameters '{"commands":[
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 536342473074.dkr.ecr.us-east-1.amazonaws.com",
              "docker pull 536342473074.dkr.ecr.us-east-1.amazonaws.com/frontend:latest",
              "docker stop frontend || true",
              "docker rm frontend || true",
              "docker run -d --name frontend -p 80:80 536342473074.dkr.ecr.us-east-1.amazonaws.com/frontend:latest"
            ]}'